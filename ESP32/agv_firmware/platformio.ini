[platformio]
src_dir = src

[env:t-can485]
platform = espressif32@6.11.0
framework = arduino
board = esp32dev
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
